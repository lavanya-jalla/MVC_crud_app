<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee List</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>

     <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="table-container">

    <h2>Employee List</h2>

    <a th:href="@{/showFormForAdd}" class="btn-custom btn-add"> Add Employee ➕</a>

    <table class="table">
        <thead>
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="emp : ${employees}">
            <td th:text="${emp.firstName}"></td>
            <td th:text="${emp.lastName}"></td>
            <td th:text="${emp.email}"></td>

            <td>
                <a th:href="@{/showFormForUpdate(employeeId=${emp.id})}"
                   class="btn-custom btn-update">Update</a>

                &nbsp;

                <a th:href="@{/delete(employeeId=${emp.id})}"
                   class="btn-custom btn-delete"
                   onclick="return confirm('Are you sure?');">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
