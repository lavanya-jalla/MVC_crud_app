<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Form</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>

<body>
<div class="container mt-5">

    <h3 class="text-center mb-4">Employee Form</h3>

    <form th:action="@{/save}" th:object="${employee}" method="post">

        <!-- Hidden ID (required for update) -->
        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label class="form-label">First Name</label>
            <input type="text" th:field="*{firstName}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" th:field="*{lastName}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success">Save</button>
        <a th:href="@{/employees}" class="btn btn-secondary ms-3">Cancel</a>
    </form>

</div>
</body>
</html>
